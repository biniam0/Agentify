openapi: 3.0.0
info:
  title: AgentX Logs API
  description: |
    External API for accessing user logs via API key authentication
    
    **Important Notice:**
    - `userId` refers to the **BarrierX User ID** throughout all endpoints
    - Ensure you use the correct BarrierX User ID when making requests

  version: 1.0.0
  contact:
    name: AgentX Support
    email: tami@barrierx.com

servers:
  - url: http://localhost:4000/api/external/v1/logs
    description: Development server
  - url: https://agentx-backend-swg5i.ondigitalocean.app/api/external/v1/logs
    description: Production server

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Service API key with logs:read scope

  parameters:
    userId:
      name: userId
      in: path
      required: true
      schema:
        type: string
      description: User ID
    
    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 100
      description: Number of records to return
    
    offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0
      description: Offset for pagination
    
    startDate:
      name: startDate
      in: query
      schema:
        type: string
        format: date-time
      description: Start date filter (ISO 8601 format)
    
    endDate:
      name: endDate
      in: query
      schema:
        type: string
        format: date-time
      description: End date filter (ISO 8601 format)

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string

    Pagination:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        hasMore:
          type: boolean

    ActivityLog:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        activityType:
          type: string
          enum: [LOGIN, LOGOUT, PROFILE_UPDATE, SETTINGS_CHANGE, DATA_EXPORT]
        status:
          type: string
          enum: [SUCCESS, FAILED, PENDING]
        metadata:
          type: object
        createdAt:
          type: string
          format: date-time

    CallLog:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        dealId:
          type: string
        conversationId:
          type: string
        callType:
          type: string
          enum: [INBOUND, OUTBOUND, CONFERENCE]
        status:
          type: string
          enum: [COMPLETED, FAILED, IN_PROGRESS, CANCELLED]
        duration:
          type: integer
        createdAt:
          type: string
          format: date-time

    CrmActionLog:
      type: object
      properties:
        id:
          type: string
        ownerId:
          type: string
        actionType:
          type: string
          enum: [CREATE_DEAL, UPDATE_DEAL, CREATE_CONTACT, UPDATE_CONTACT, CREATE_NOTE]
        conversationId:
          type: string
        dealId:
          type: string
        status:
          type: string
          enum: [SUCCESS, FAILED, PENDING]
        metadata:
          type: object
        createdAt:
          type: string
          format: date-time

    WebhookLog:
      type: object
      properties:
        id:
          type: string
        conversationId:
          type: string
        webhookType:
          type: string
          enum: [INCOMING, OUTGOING]
        eventType:
          type: string
        payload:
          type: object
        responseStatus:
          type: integer
        createdAt:
          type: string
          format: date-time

    SchedulerLog:
      type: object
      properties:
        id:
          type: string
        jobType:
          type: string
          enum: [SYNC_CONTACTS, SYNC_DEALS, CLEANUP, BACKUP]
        status:
          type: string
          enum: [SUCCESS, FAILED, PENDING]
        executionTime:
          type: integer
        metadata:
          type: object
        createdAt:
          type: string
          format: date-time

    ErrorLog:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        errorType:
          type: string
          enum: [API_ERROR, DATABASE_ERROR, VALIDATION_ERROR, SYSTEM_ERROR]
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        message:
          type: string
        stackTrace:
          type: string
        metadata:
          type: object
        createdAt:
          type: string
          format: date-time

    SmsLog:
      type: object
      properties:
        id:
          type: string
        messageSid:
          type: string
        status:
          type: string
          enum: [QUEUED, SENT, DELIVERED, FAILED]
        toPhone:
          type: string
        fromPhone:
          type: string
        messageBody:
          type: string
        userId:
          type: string
        barrierxUserId:
          type: string
        hubspotOwnerId:
          type: string
        userName:
          type: string
        userEmail:
          type: string
        ownerName:
          type: string
        dealId:
          type: string
        dealName:
          type: string
        meetingId:
          type: string
        meetingTitle:
          type: string
        errorMessage:
          type: string
        twilioErrorCode:
          type: string
        triggerSource:
          type: string
          enum: [MANUAL, SCHEDULED, RETRY, WEBHOOK]
        createdAt:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
        userId:
          type: string

paths:
  /test:
    get:
      summary: Test API Key Authentication
      description: Verify that your API key is working correctly
      tags:
        - Authentication
      responses:
        '200':
          description: API key is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  service:
                    type: string
                  scopes:
                    type: array
                    items:
                      type: string
                  timestamp:
                    type: string
                    format: date-time
        '401':
          description: Unauthorized - Invalid or missing API key
        '403':
          description: Forbidden - Insufficient scopes

  /users/{userId}/activity:
    get:
      summary: Get User Activity Logs
      description: Retrieve activity logs for a specific user
      tags:
        - Activity Logs
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - name: activityType
          in: query
          schema:
            type: string
            enum: [LOGIN, LOGOUT, PROFILE_UPDATE, SETTINGS_CHANGE, DATA_EXPORT]
        - name: status
          in: query
          schema:
            type: string
            enum: [SUCCESS, FAILED, PENDING]
      responses:
        '200':
          description: Activity logs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  logType:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivityLog'
                  user:
                    $ref: '#/components/schemas/User'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  requestedBy:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error

  /users/{userId}/calls:
    get:
      summary: Get User Call Logs
      description: Retrieve call logs for a specific user
      tags:
        - Call Logs
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - name: dealId
          in: query
          schema:
            type: string
        - name: callType
          in: query
          schema:
            type: string
            enum: [INBOUND, OUTBOUND, CONFERENCE]
        - name: status
          in: query
          schema:
            type: string
            enum: [COMPLETED, FAILED, IN_PROGRESS, CANCELLED]
      responses:
        '200':
          description: Call logs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  logType:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CallLog'
                  user:
                    $ref: '#/components/schemas/User'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  requestedBy:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '404':
          description: User not found
        '500':
          description: Internal server error

  /users/{userId}/crm-actions:
    get:
      summary: Get User CRM Action Logs
      description: Retrieve CRM action logs for a specific user
      tags:
        - CRM Action Logs
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - name: actionType
          in: query
          schema:
            type: string
            enum: [CREATE_DEAL, UPDATE_DEAL, CREATE_CONTACT, UPDATE_CONTACT, CREATE_NOTE]
        - name: conversationId
          in: query
          schema:
            type: string
        - name: dealId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [SUCCESS, FAILED, PENDING]
      responses:
        '200':
          description: CRM action logs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  logType:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CrmActionLog'
                  user:
                    $ref: '#/components/schemas/User'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  requestedBy:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '404':
          description: User not found
        '500':
          description: Internal server error

  /users/{userId}/webhooks:
    get:
      summary: Get User Webhook Logs
      description: Retrieve webhook logs for a specific user's conversations
      tags:
        - Webhook Logs
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - name: webhookType
          in: query
          schema:
            type: string
            enum: [INCOMING, OUTGOING]
        - name: eventType
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Webhook logs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  logType:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WebhookLog'
                  user:
                    $ref: '#/components/schemas/User'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  message:
                    type: string
                  requestedBy:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '404':
          description: User not found
        '500':
          description: Internal server error

  /users/{userId}/scheduler:
    get:
      summary: Get Scheduler Logs
      description: Retrieve scheduler/job logs (system-wide, not user-specific)
      tags:
        - Scheduler Logs
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - name: jobType
          in: query
          schema:
            type: string
            enum: [SYNC_CONTACTS, SYNC_DEALS, CLEANUP, BACKUP]
        - name: status
          in: query
          schema:
            type: string
            enum: [SUCCESS, FAILED, PENDING]
      responses:
        '200':
          description: Scheduler logs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  logType:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SchedulerLog'
                  note:
                    type: string
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  requestedBy:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '404':
          description: User not found
        '500':
          description: Internal server error

  /users/{userId}/errors:
    get:
      summary: Get User Error Logs
      description: Retrieve error logs for a specific user
      tags:
        - Error Logs
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - name: errorType
          in: query
          schema:
            type: string
            enum: [API_ERROR, DATABASE_ERROR, VALIDATION_ERROR, SYSTEM_ERROR]
        - name: severity
          in: query
          schema:
            type: string
            enum: [LOW, MEDIUM, HIGH, CRITICAL]
      responses:
        '200':
          description: Error logs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  logType:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ErrorLog'
                  user:
                    $ref: '#/components/schemas/User'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  requestedBy:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '404':
          description: User not found
        '500':
          description: Internal server error

  /users/{userId}/sms:
    get:
      summary: Get User SMS Logs
      description: Retrieve SMS notification logs for a specific user
      tags:
        - SMS Logs
      parameters:
        - $ref: '#/components/parameters/userId'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/startDate'
        - $ref: '#/components/parameters/endDate'
        - name: status
          in: query
          schema:
            type: string
            enum: [QUEUED, SENT, DELIVERED, FAILED]
        - name: meetingId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: SMS logs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  logType:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SmsLog'
                  user:
                    $ref: '#/components/schemas/User'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  requestedBy:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '404':
          description: User not found
        '500':
          description: Internal server error

  /users/{userId}/all:
    get:
      summary: Get All User Logs (Batch)
      description: Retrieve all log types for a user in a single request
      tags:
        - Batch Operations
      parameters:
        - $ref: '#/components/parameters/userId'
        - name: days
          in: query
          schema:
            type: integer
            default: 7
            minimum: 1
            maximum: 365
          description: Number of days to look back
      responses:
        '200':
          description: All logs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  logType:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  data:
                    type: object
                    properties:
                      activity:
                        type: array
                        items:
                          $ref: '#/components/schemas/ActivityLog'
                      calls:
                        type: array
                        items:
                          $ref: '#/components/schemas/CallLog'
                      crmActions:
                        type: array
                        items:
                          $ref: '#/components/schemas/CrmActionLog'
                      webhooks:
                        type: array
                        items:
                          $ref: '#/components/schemas/WebhookLog'
                      errors:
                        type: array
                        items:
                          $ref: '#/components/schemas/ErrorLog'
                      sms:
                        type: array
                        items:
                          $ref: '#/components/schemas/SmsLog'
                      scheduler:
                        type: array
                        items:
                          $ref: '#/components/schemas/SchedulerLog'
                  summary:
                    type: object
                    properties:
                      totalActivity:
                        type: integer
                      totalCalls:
                        type: integer
                      totalCrmActions:
                        type: integer
                      totalWebhooks:
                        type: integer
                      totalErrors:
                        type: integer
                      totalSms:
                        type: integer
                      totalScheduler:
                        type: integer
                      grandTotal:
                        type: integer
                  filters:
                    type: object
                    properties:
                      days:
                        type: integer
                      startDate:
                        type: string
                        format: date-time
                      endDate:
                        type: string
                        format: date-time
                  requestedBy:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Invalid days parameter
        '404':
          description: User not found
        '500':
          description: Internal server error

tags:
  - name: Authentication
    description: API key authentication testing
  - name: Activity Logs
    description: User activity and authentication logs
  - name: Call Logs
    description: Voice call and conversation logs
  - name: CRM Action Logs
    description: CRM operations and integrations logs
  - name: Webhook Logs
    description: Webhook events and callbacks logs
  - name: Scheduler Logs
    description: Scheduled jobs and tasks logs
  - name: Error Logs
    description: Application errors and exceptions logs
  - name: SMS Logs
    description: SMS notification logs sent to deal owners
  - name: Batch Operations
    description: Batch endpoints for multiple log types
